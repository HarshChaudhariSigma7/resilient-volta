<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 2000" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Main drawing group with near-white strokes -->
  <g stroke="#FFFFFF" stroke-width="0.75" opacity="0.80" fill="none">
    <!-- Centerline of the Rocket -->
    <line x1="600" y1="50" x2="600" y2="1950" stroke-dasharray="12,6,3,6" stroke="#FFFFFF" stroke-width="1"/>

    <!-- ================= PAYLOAD FAIRING & NOSE CONE ================= -->
    <path d="M 490 350 C 490 220, 530 130, 600 80 C 670 130, 710 220, 710 350 Z" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="490" y1="350" x2="710" y2="350" stroke="#FFFFFF"/>
    <!-- Payload (Satellite silhouette inside) -->
    <path d="M 600 180 L 600 280 M 560 220 L 640 220 M 550 250 L 650 250" opacity="0.4"/>
    <rect x="580" y="210" width="40" height="50" rx="3" opacity="0.5"/>
    <path d="M 540 200 L 580 220 M 660 200 L 620 220 M 540 270 L 580 250 M 660 270 L 620 250" opacity="0.4" stroke-dasharray="2,2"/>

    <!-- ================= GUIDANCE / AVIONICS BAY ================= -->
    <rect x="490" y="350" width="220" height="40" stroke="#FFFFFF" stroke-width="1.25"/>
    <line x1="490" y1="370" x2="710" y2="370" stroke-dasharray="2,2"/>
    <text x="510" y="375" font-family="Inter, sans-serif" font-size="9" fill="#FFFFFF" stroke="none">AVIONICS SECTION</text>

    <!-- Avionics block diagram schematic overlay -->
    <rect x="740" y="335" width="150" height="55" stroke="#FFFFFF" stroke-width="0.5" opacity="0.6"/>
    <text x="748" y="348" font-family="Inter, sans-serif" font-size="7.5" fill="#FFFFFF" stroke="none">TELEMETRY SYSTEM</text>
    <text x="748" y="360" font-family="Inter, sans-serif" font-size="7" fill="#FFFFFF" stroke="none">IMU ──► NAV-COMP ──► VALVE ACTUATORS</text>
    <text x="748" y="370" font-family="Inter, sans-serif" font-size="7" fill="#FFFFFF" stroke="none">      └──► 2.4 GHz LINK ──► GROUND STN</text>
    <line x1="710" y1="370" x2="740" y2="370" stroke-dasharray="1,3" opacity="0.6"/>

    <!-- ================= LIQUID OXYGEN (LOX) TANK ================= -->
    <path d="M 490 450 C 490 410, 710 410, 710 450" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="490" y1="450" x2="490" y2="900" stroke="#FFFFFF" stroke-width="1.75"/>
    <line x1="710" y1="450" x2="710" y2="900" stroke="#FFFFFF" stroke-width="1.75"/>
    <path d="M 490 900 C 490 940, 710 940, 710 900" stroke="#FFFFFF" stroke-width="1.5"/>
    
    <!-- Orthogrid Structural Stiffeners -->
    <line x1="500" y1="450" x2="500" y2="900" stroke-dasharray="8,8" opacity="0.3"/>
    <line x1="520" y1="450" x2="520" y2="900" stroke-dasharray="8,8" opacity="0.3"/>
    <line x1="680" y1="450" x2="680" y2="900" stroke-dasharray="8,8" opacity="0.3"/>
    <line x1="700" y1="450" x2="700" y2="900" stroke-dasharray="8,8" opacity="0.3"/>

    <!-- LOX Tank Baffles / Rings -->
    <line x1="490" y1="520" x2="710" y2="520" stroke-dasharray="4,4"/>
    <line x1="490" y1="600" x2="710" y2="600" stroke-dasharray="4,4"/>
    <line x1="490" y1="680" x2="710" y2="680" stroke-dasharray="4,4"/>
    <line x1="490" y1="760" x2="710" y2="760" stroke-dasharray="4,4"/>
    <line x1="490" y1="840" x2="710" y2="840" stroke-dasharray="4,4"/>

    <!-- Slosh Baffle Details -->
    <path d="M 490 520 L 510 540 M 710 520 L 690 540" opacity="0.5"/>
    <path d="M 490 600 L 510 620 M 710 600 L 690 620" opacity="0.5"/>
    <path d="M 490 680 L 510 700 M 710 680 L 690 700" opacity="0.5"/>
    <path d="M 490 760 L 510 780 M 710 760 L 690 780" opacity="0.5"/>
    <path d="M 490 840 L 510 860 M 710 840 L 690 860" opacity="0.5"/>

    <!-- Exterior Feedline Tunnels -->
    <line x1="475" y1="900" x2="475" y2="1550" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="725" y1="900" x2="725" y2="1550" stroke="#FFFFFF" stroke-width="2"/>

    <!-- Central LOX Feed Line -->
    <line x1="600" y1="920" x2="600" y2="1550" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="595" y1="920" x2="595" y2="1550" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="605" y1="920" x2="605" y2="1550" stroke="#FFFFFF" stroke-width="0.5"/>

    <!-- ================= INTERSTAGE / HELIUM PRESSURIZATION ================= -->
    <rect x="490" y="930" width="220" height="150" stroke="#FFFFFF" stroke-width="1.25"/>
    <path d="M 490 930 L 710 1080 M 710 930 L 490 1080" stroke-dasharray="3,3"/>
    <path d="M 490 1005 L 710 1005" stroke-dasharray="3,3"/>
    <!-- Helium Spheres -->
    <circle cx="540" cy="1005" r="20" stroke="#FFFFFF" stroke-width="1"/>
    <circle cx="660" cy="1005" r="20" stroke="#FFFFFF" stroke-width="1"/>
    <text x="525" y="1008" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">He</text>
    <text x="645" y="1008" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">He</text>

    <!-- ================= RP-1 FUEL TANK ================= -->
    <path d="M 490 1120 C 490 1080, 710 1080, 710 1120" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="490" y1="1120" x2="490" y2="1500" stroke="#FFFFFF" stroke-width="1.75"/>
    <line x1="710" y1="1120" x2="710" y2="1500" stroke="#FFFFFF" stroke-width="1.75"/>
    <path d="M 490 1500 C 490 1540, 710 1540, 710 1500" stroke="#FFFFFF" stroke-width="1.5"/>
    
    <line x1="500" y1="1120" x2="500" y2="1500" stroke-dasharray="8,8" opacity="0.3"/>
    <line x1="520" y1="1120" x2="520" y2="1500" stroke-dasharray="8,8" opacity="0.3"/>
    <line x1="680" y1="1120" x2="680" y2="1500" stroke-dasharray="8,8" opacity="0.3"/>
    <line x1="700" y1="1120" x2="700" y2="1500" stroke-dasharray="8,8" opacity="0.3"/>

    <!-- Fuel Tank Baffles -->
    <line x1="490" y1="1190" x2="710" y2="1190" stroke-dasharray="4,4"/>
    <line x1="490" y1="1270" x2="710" y2="1270" stroke-dasharray="4,4"/>
    <line x1="490" y1="1350" x2="710" y2="1350" stroke-dasharray="4,4"/>
    <line x1="490" y1="1430" x2="710" y2="1430" stroke-dasharray="4,4"/>

    <!-- Slosh Baffle Details -->
    <path d="M 490 1190 L 510 1210 M 710 1190 L 690 1210" opacity="0.5"/>
    <path d="M 490 1270 L 510 1290 M 710 1270 L 690 1290" opacity="0.5"/>
    <path d="M 490 1350 L 510 1370 M 710 1350 L 690 1370" opacity="0.5"/>
    <path d="M 490 1430 L 510 1450 M 710 1430 L 690 1450" opacity="0.5"/>

    <!-- ================= THRUST STRUTS & TURBOPUMPS ================= -->
    <rect x="490" y="1530" width="220" height="70" stroke="#FFFFFF" stroke-dasharray="2,2"/>
    <path d="M 550 1530 L 550 1600 M 650 1530 L 650 1600" stroke="#FFFFFF"/>
    <circle cx="550" cy="1580" r="12"/>
    <circle cx="650" cy="1580" r="12"/>
    <line x1="550" y1="1580" x2="650" y2="1580" stroke="#FFFFFF" stroke-width="1.5"/>
    <text x="585" y="1584" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">TURBOPUMPS</text>

    <!-- Hydraulic Actuators -->
    <path d="M 525 1580 L 545 1630" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 520 1580 L 528 1580 M 540 1630 L 550 1630" stroke="#FFFFFF" stroke-width="1"/>
    <path d="M 675 1580 L 655 1630" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 672 1580 L 680 1580 M 650 1630 L 660 1630" stroke="#FFFFFF" stroke-width="1"/>

    <!-- ================= ENGINE THRUST CHAMBER & NOZZLE ================= -->
    <rect x="530" y="1600" width="140" height="20" stroke="#FFFFFF" stroke-width="1.25"/>
    
    <path d="M 530 1620 L 530 1690 C 530 1720, 570 1730, 570 1750 C 570 1770, 490 1840, 490 1910" stroke="#FFFFFF" stroke-width="1.75"/>
    <path d="M 670 1620 L 670 1690 C 670 1720, 630 1730, 630 1750 C 630 1770, 710 1840, 710 1910" stroke="#FFFFFF" stroke-width="1.75"/>
    
    <path d="M 525 1620 L 525 1690 C 525 1722, 565 1732, 565 1750 C 565 1768, 485 1838, 485 1910" stroke-dasharray="2,2"/>
    <path d="M 675 1620 L 675 1690 C 675 1722, 635 1732, 635 1750 C 635 1768, 715 1838, 715 1910" stroke-dasharray="2,2"/>

    <!-- Turbine Exhaust Duct -->
    <path d="M 650 1592 L 678 1620 L 678 1780 C 678 1810, 715 1850, 715 1910" stroke="#FFFFFF" stroke-width="1.25"/>

    <!-- Exhaust plume (Shock diamonds) -->
    <path d="M 490 1910 L 545 1940 L 600 1910 L 655 1940 L 710 1910" opacity="0.5"/>
    <path d="M 545 1940 L 572 1955 L 600 1940 L 628 1955 L 655 1940" opacity="0.4"/>
    <path d="M 572 1955 L 600 1970 L 628 1955" opacity="0.3"/>

    <!-- ================= TECHNICAL ANNOTATIONS ================= -->
    <line x1="490" y1="480" x2="710" y2="480" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="560" y="472" font-family="Inter, sans-serif" font-size="9" fill="#FFFFFF" stroke="none">D = 3.66m</text>

    <!-- LOX Tank Label -->
    <line x1="420" y1="620" x2="520" y2="620" marker-end="url(#arrow)"/>
    <text x="290" y="623" font-family="Inter, sans-serif" font-size="9.5" fill="#FFFFFF" stroke="none">LIQUID OXYGEN TANK</text>
    <text x="290" y="635" font-family="Inter, sans-serif" font-size="8.5" fill="#FFFFFF" stroke="none">Volume: 45.2 m³ / Pressurized to 2.1 bar</text>

    <!-- RP-1 Fuel Tank Label -->
    <line x1="780" y1="1310" x2="680" y2="1310" marker-end="url(#arrow)"/>
    <text x="795" y="1313" font-family="Inter, sans-serif" font-size="9.5" fill="#FFFFFF" stroke="none">RP-1 FUEL TANK</text>
    <text x="795" y="1325" font-family="Inter, sans-serif" font-size="8.5" fill="#FFFFFF" stroke="none">Volume: 32.8 m³ / Kerosene formulation</text>

    <!-- Exterior Feedline Label -->
    <line x1="420" y1="1250" x2="475" y2="1250" marker-end="url(#arrow)"/>
    <text x="290" y="1245" font-family="Inter, sans-serif" font-size="9.5" fill="#FFFFFF" stroke="none">EXTERIOR FEEDLINE TUNNEL</text>
    <text x="290" y="1257" font-family="Inter, sans-serif" font-size="8.5" fill="#FFFFFF" stroke="none">Twin S-IC style structural enclosures</text>

    <!-- Weld Land detail -->
    <line x1="420" y1="800" x2="490" y2="800" marker-end="url(#arrow)"/>
    <text x="290" y="795" font-family="Inter, sans-serif" font-size="8.5" fill="#FFFFFF" stroke="none">WELD LAND - SECTION A-A</text>
    <text x="290" y="805" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">Al-Li Alloy 2195 / Friction Stir Welded</text>

    <!-- Actuator Detail -->
    <line x1="420" y1="1580" x2="525" y2="1580" marker-start="url(#arrow)"/>
    <text x="290" y="1575" font-family="Inter, sans-serif" font-size="9" fill="#FFFFFF" stroke="none">GIMBAL ACTUATOR (±6°)</text>
    <text x="290" y="1585" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">Hydraulic cylinder gimbal system</text>

    <!-- Nozzle Throat Detail -->
    <line x1="570" y1="1750" x2="420" y2="1750" marker-start="url(#arrow)"/>
    <text x="290" y="1745" font-family="Inter, sans-serif" font-size="9" fill="#FFFFFF" stroke="none">THROAT SECTION</text>
    <text x="290" y="1755" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">d_t = 120mm / High thermal flux</text>

    <!-- Engine Thrust Chamber Label -->
    <line x1="780" y1="1680" x2="660" y2="1680" marker-end="url(#arrow)"/>
    <text x="795" y="1683" font-family="Inter, sans-serif" font-size="9.5" fill="#FFFFFF" stroke="none">THRUST CHAMBER ASSEMBLY</text>
    <text x="795" y="1695" font-family="Inter, sans-serif" font-size="8.5" fill="#FFFFFF" stroke="none">Regenerative channels / RP-1 coolant</text>

    <!-- ================= ADDED: LOWER LEFT THERMODYNAMIC FORMULAS ================= -->
    <g transform="translate(10, 1720)" stroke="#FFFFFF" stroke-width="0.5" opacity="0.8">
      <rect x="0" y="0" width="260" height="230" stroke="#FFFFFF" stroke-width="0.75" fill="none"/>
      <text x="12" y="20" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#FFFFFF" stroke="none">PERFORMANCE DATA TABLES</text>
      
      <text x="12" y="45" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">CHARACTERISTIC VELOCITY (c*):</text>
      <text x="24" y="58" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">c* = (p_c * A_t) / m_dot = 1,745 m/s</text>
      
      <text x="12" y="80" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">THRUST COEFFICIENT (C_f):</text>
      <text x="24" y="93" font-family="Inter, sans-serif" font-size="7.5" fill="#FFFFFF" stroke="none">C_f = sqrt[(2k²/(k-1))(2/(k+1))^((k+1)/(k-1)) * (1-(p_e/p_c)^((k-1)/k))]</text>
      <text x="24" y="105" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">C_f (vacuum) = 1.84</text>
      
      <text x="12" y="130" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">TOTAL VACUUM THRUST (F_vac):</text>
      <text x="24" y="143" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">F = m_dot * v_e + (p_e - p_a)*A_e = 825.4 kN</text>
      
      <text x="12" y="165" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">PROPULSION SPECS (LOX/RP-1):</text>
      <text x="24" y="178" font-family="Inter, sans-serif" font-size="7.5" fill="#FFFFFF" stroke="none">LOX MASS FLOW: 198.4 kg/s</text>
      <text x="24" y="188" font-family="Inter, sans-serif" font-size="7.5" fill="#FFFFFF" stroke="none">RP-1 MASS FLOW: 88.5 kg/s</text>
      <text x="24" y="198" font-family="Inter, sans-serif" font-size="7.5" fill="#FFFFFF" stroke="none">MIXTURE RATIO (O/F): 2.24</text>
      <text x="24" y="208" font-family="Inter, sans-serif" font-size="7.5" fill="#FFFFFF" stroke="none">CHAMBER TEMP (Tc): 3,570 K</text>
    </g>

    <!-- ================= ADDED: LOWER RIGHT BLUEPRINT TITLE BLOCK ================= -->
    <g transform="translate(930, 1720)" stroke="#FFFFFF" stroke-width="0.5" opacity="0.8">
      <!-- Outer Border -->
      <rect x="0" y="0" width="260" height="230" stroke="#FFFFFF" stroke-width="0.75" fill="none"/>
      
      <!-- Title Lines -->
      <line x1="0" y1="45" x2="260" y2="45" stroke="#FFFFFF" stroke-width="0.75"/>
      <line x1="0" y1="90" x2="260" y2="90" stroke="#FFFFFF" stroke-width="0.75"/>
      <line x1="0" y1="135" x2="260" y2="135" stroke="#FFFFFF" stroke-width="0.75"/>
      <line x1="0" y1="180" x2="260" y2="180" stroke="#FFFFFF" stroke-width="0.75"/>
      
      <!-- Vertical Splits -->
      <line x1="130" y1="135" x2="130" y2="180" stroke="#FFFFFF" stroke-width="0.5"/>
      <line x1="130" y1="180" x2="130" y2="230" stroke="#FFFFFF" stroke-width="0.5"/>
      
      <!-- Text Data -->
      <text x="12" y="25" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" stroke="none">VIDHI AHUJA portfolio</text>
      <text x="12" y="38" font-family="Inter, sans-serif" font-size="7.5" fill="#FFFFFF" stroke="none">Aerodynamics and Propulsion R&amp;D Notebook</text>
      
      <text x="12" y="65" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF" stroke="none">DWG TITLE: SLV-3 PROPULSION</text>
      <text x="12" y="78" font-family="Inter, sans-serif" font-size="7.5" fill="#FFFFFF" stroke="none">Vertical Vehicle Profile &amp; Engine Assembly</text>
      
      <text x="12" y="110" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#FFFFFF" stroke="none">DWG NO: AGY-SLV-003-R2</text>
      <text x="12" y="122" font-family="Inter, sans-serif" font-size="7.5" fill="#FFFFFF" stroke="none">Sheet 1 of 1 / Cadence Reference System</text>
      
      <!-- Left Split 1 -->
      <text x="12" y="152" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">SCALE: 1:50</text>
      <text x="12" y="167" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">UNITS: Metric (mm)</text>
      
      <!-- Right Split 1 -->
      <text x="142" y="152" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">DRAWN BY: V. Ahuja</text>
      <text x="142" y="167" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">CHECKED BY: V. Ahuja</text>
      
      <!-- Left Split 2 -->
      <text x="12" y="198" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">DATE: 2026-07-12</text>
      <text x="12" y="213" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">SYS REQ: PROP-9-CD</text>
      
      <!-- Right Split 2 -->
      <text x="142" y="198" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">RELEASE: Rev A</text>
      <text x="142" y="213" font-family="Inter, sans-serif" font-size="8" fill="#FFFFFF" stroke="none">STATUS: APPROVED</text>
    </g>

    <!-- Isometric Coordinate System Axes -->
    <g transform="translate(1080, 1680)">
      <line x1="0" y1="0" x2="-30" y2="15" marker-end="url(#arrow)"/>
      <text x="-38" y="23" font-family="Inter, sans-serif" font-size="10" fill="#FFFFFF" stroke="none">X</text>
      <line x1="0" y1="0" x2="30" y2="15" marker-end="url(#arrow)"/>
      <text x="35" y="23" font-family="Inter, sans-serif" font-size="10" fill="#FFFFFF" stroke="none">Y</text>
      <line x1="0" y1="0" x2="0" y2="-35" marker-end="url(#arrow)"/>
      <text x="-3" y="-42" font-family="Inter, sans-serif" font-size="10" fill="#FFFFFF" stroke="none">Z</text>
    </g>
  </g>
</svg>
